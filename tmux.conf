# =============================================================================
# GENERAL
# =============================================================================

unbind C-b
set -g prefix ¡
bind ¡ send-prefix
set -g escape-time 0
set -g mouse on
set -g repeat-time 1000
set -g history-limit 1000
set -g renumber-windows on

# =============================================================================
# INDEXACIÓN
# =============================================================================

set -g base-index 1
set -g pane-base-index 1

# =============================================================================
# TERMINAL Y COLORES
# =============================================================================

set -g default-terminal "${TERM}"
set -as terminal-overrides ",*:RGB"

# =============================================================================
# BARRA DE ESTADO
# =============================================================================

set -g status-style "bg=colour235,fg=colour244"
set -g status-left ""

# Inactive windows: cyan number + gray name
set -g window-status-format " #[fg=colour117]#I#[fg=colour244]:#W "

# Active window: bright white number + orange name on dark blue background
set -g window-status-current-format " #[fg=colour231,bg=colour24,bold] #I#[fg=colour214]:#W "
set -g window-status-current-style "#{?windows_zoomed_flag,bg=yellow,fg=green,nobold}"
set -g window-status-bell-style "bg=red,fg=white,nobold"

# Right side: memory (green) + disk (peach) + IP (steel blue) + clock (warm cream)
set -g status-right " #[fg=colour76]▦ #(free -h | awk '/Mem/{print $3}') #[fg=colour216]◈ #(df -h / | awk 'NR==2{print $4}') #[fg=colour75]⌁ #(ifconfig 2>&1 | grep -A3 wlan0 | awk '/inet /{print $2}') #[fg=colour223]⧗ %H:%M "

# =============================================================================
# BORDES DE PANEL
# =============================================================================

set -g pane-border-lines single
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour24"

# =============================================================================
# NAVEGACIÓN ENTRE PANELES — Alt + Flechas
# =============================================================================

bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

bind -n M-Left previous-window
bind -n M-Right next-window

# =============================================================================
# CREACIÓN DE PANELES — Alt + Shift + Flechas
# =============================================================================

bind -n M-S-Left split-window -h -b
bind -n M-S-Right split-window -h
bind -n M-S-Up split-window -v -b
bind -n M-S-Down split-window -v

# =============================================================================
# NAVEGACIÓN ENTRE VENTANAS — Alt + N
# =============================================================================

bind -n M-1 if-shell "tmux select-window -t :1" "" "new-window -t :1"
bind -n M-2 if-shell "tmux select-window -t :2" "" "new-window -t :2"
bind -n M-3 if-shell "tmux select-window -t :3" "" "new-window -t :3"
bind -n M-4 if-shell "tmux select-window -t :4" "" "new-window -t :4"
bind -n M-5 if-shell "tmux select-window -t :5" "" "new-window -t :5"
bind -n M-6 if-shell "tmux select-window -t :6" "" "new-window -t :6"
bind -n M-7 if-shell "tmux select-window -t :7" "" "new-window -t :7"
bind -n M-8 if-shell "tmux select-window -t :8" "" "new-window -t :8"
bind -n M-9 if-shell "tmux select-window -t :9" "" "new-window -t :9"

# =============================================================================
# ATAJOS RÁPIDOS
# =============================================================================

bind -n M-x kill-pane
bind -n M-Space next-window
bind -n M-e copy-mode
bind -n M-w choose-window
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# =============================================================================
# MODO COPIA (VI)
# =============================================================================

set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
